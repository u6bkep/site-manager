<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Dashboard - Site Manager</title>
    <link rel="stylesheet" href="/assets/style.css">
    <script src="/assets/app.js"></script>
</head>
<body>
    <nav>
        <div class="container">
            <a href="/" class="brand">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                    <polyline points="9 22 9 12 15 12 15 22"></polyline>
                </svg>
                Site Manager
            </a>
            <div class="nav-actions"></div>
        </div>
    </nav>

    <main class="container" style="padding-top: 2rem;">
        <div class="flex items-center justify-between mb-6">
            <h2 style="font-size: 1.5rem;">My Tools</h2>
            <a href="/sites/new" class="btn btn-primary">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
                    <line x1="12" y1="5" x2="12" y2="19"></line>
                    <line x1="5" y1="12" x2="19" y2="12"></line>
                </svg>
                New Tool
            </a>
        </div>

        <div class="mb-6">
            <div class="search-container">
                <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="11" cy="11" r="8"></circle>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
                <input type="text" id="search" class="search-input" placeholder="Search tools...">
            </div>
        </div>

        <div id="content" class="grid">
            <div style="grid-column: 1/-1; text-align: center; padding: 4rem;">
                 <div class="spinner" style="margin: 0 auto;"></div>
            </div>
        </div>
    </main>

    <script>
        let allSites = [];

        async function loadSites() {
            const container = document.getElementById('content');
            try {
                const sites = await apiJson('/api/sites');
                allSites = sites;
                renderSites(sites);
            } catch (e) {
                container.innerHTML = `
                    <div class="empty-state" style="grid-column: 1/-1;">
                        <p class="text-danger">Failed to load tools.</p>
                        <button onclick="loadSites()" class="btn btn-secondary">Retry</button>
                    </div>
                `;
            }
        }

        function renderSites(sites) {
            const container = document.getElementById('content');
            if (sites.length === 0) {
                if (document.getElementById('search').value) {
                    container.innerHTML = `<p class="text-muted" style="grid-column: 1/-1; text-align: center; padding: 4rem;">No tools found matching your search.</p>`;
                } else {
                    container.innerHTML = `
                        <div class="empty-state" style="grid-column: 1/-1;">
                            <div style="font-size: 4rem; margin-bottom: 1.5rem;">🚀</div>
                            <h3>Welcome to Site Manager</h3>
                            <p>You haven't deployed any tools yet. Upload a .zip or connect a Git repository to get started.</p>
                            <div style="margin-top: 1.5rem;">
                                <a href="/sites/new" class="btn btn-primary">Create Your First Tool</a>
                            </div>
                        </div>
                    `;
                }
                return;
            }

            container.innerHTML = sites.map(site => `
                <a href="/sites/${site.slug}" class="card card-hover" style="text-decoration: none; color: inherit; display: flex; flex-direction: column; height: 100%;">
                    <div style="flex: 1;">
                        <div class="flex justify-between items-start mb-4">
                            <span class="badge ${site.source_type}">${site.source_type}</span>
                            <span class="text-muted text-xs">${timeAgo(site.last_deployed_at)}</span>
                        </div>
                        <h3 style="margin-bottom: 0.25rem;">${escapeHtml(site.name)}</h3>
                        <div class="text-muted text-xs font-mono" style="margin-bottom: 1rem; overflow: hidden; text-overflow: ellipsis; opacity: 0.7;">/s/${site.slug}</div>
                    </div>
                    <div style="padding-top: 1rem; border-top: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center;">
                         <span class="text-xs text-muted">Author: ${escapeHtml(site.created_by.split('@')[0])}</span>
                         <span class="text-xs" style="color: var(--primary)">Manage &rarr;</span>
                    </div>
                </a>
            `).join('');
        }

        // Search Logic
        document.getElementById('search').addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase();
            const filtered = allSites.filter(s => 
                s.name.toLowerCase().includes(query) || 
                s.slug.toLowerCase().includes(query)
            );
            renderSites(filtered);
        });

        loadSites();
    </script>
</body>
</html>
