<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Tool Details - Site Manager</title>
    <link rel="stylesheet" href="/assets/style.css">
    <script src="/assets/app.js"></script>
    <style>
        .sidebar-section {
            margin-bottom: 2.5rem;
        }
        
        .sidebar-section h3 {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            margin-bottom: 1rem;
            border-bottom: 1px solid var(--border);
            padding-bottom: 0.5rem;
        }

        .info-grid {
            display: grid;
            gap: 1rem;
        }

        .info-item {
            display: flex;
            flex-direction: column;
        }

        .info-item label {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-bottom: 0.25rem;
        }

        .info-item .value {
            font-size: 0.875rem;
            font-family: monospace;
            word-break: break-all;
        }

        .action-group {
            display: grid;
            gap: 0.75rem;
        }

        .toggle {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            cursor: pointer;
            font-size: 0.875rem;
        }

        .toggle input { display: none; }

        .toggle-slider {
            position: relative;
            width: 36px;
            height: 20px;
            background: var(--border);
            border-radius: 10px;
            transition: background 0.2s;
            flex-shrink: 0;
        }

        .toggle-slider::after {
            content: '';
            position: absolute;
            top: 2px;
            left: 2px;
            width: 16px;
            height: 16px;
            background: white;
            border-radius: 50%;
            transition: transform 0.2s;
        }

        .toggle input:checked + .toggle-slider {
            background: var(--primary);
        }

        .toggle input:checked + .toggle-slider::after {
            transform: translateX(16px);
        }
    </style>
</head>
<body>
    <nav>
        <div class="container">
            <a href="/" class="brand">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                    <polyline points="9 22 9 12 15 12 15 22"></polyline>
                </svg>
                Site Manager
            </a>
            <div class="nav-actions"></div>
        </div>
    </nav>

    <div id="content">
         <div class="spinner" style="margin: 10rem auto;"></div>
    </div>

    <script>
        const slug = window.location.pathname.split('/').pop();

        async function loadSite() {
            const container = document.getElementById('content');
            try {
                const site = await apiJson(`/api/sites/${slug}`);
                document.title = `${site.name} - Site Manager`;
                const siteUrl = `/s/${site.slug}/`;
                const fullUrl = window.location.origin + siteUrl;

                container.className = 'site-wrapper';
                container.innerHTML = `
                    <main class="site-main">
                        <div class="preview-container">
                            <div class="preview-bar">
                                <div class="flex items-center gap-2">
                                    <span class="badge ${site.source_type}">${site.source_type}</span>
                                    <span class="text-xs text-muted font-mono">${siteUrl}</span>
                                </div>
                                <div class="flex gap-2">
                                    <button class="btn btn-sm btn-secondary" onclick="document.getElementById('preview-frame').src += ''" title="Reload Preview">
                                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 4v6h-6"></path><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path></svg>
                                    </button>
                                    <a href="${siteUrl}" target="_blank" class="btn btn-sm btn-primary">Open Tool ↗</a>
                                </div>
                            </div>
                            <iframe src="${siteUrl}" class="preview-frame" id="preview-frame"></iframe>
                        </div>
                    </main>

                    <aside class="site-sidebar">
                        <div class="sidebar-section">
                            <h2 style="font-size: 1.5rem; margin-bottom: 0.5rem;">${escapeHtml(site.name)}</h2>
                            <p class="text-muted text-sm mb-4">Manage this tool's deployment and settings.</p>
                            <button class="btn btn-secondary btn-sm" style="width: 100%;" onclick="copyToClipboard('${fullUrl}')">
                                🔗 Copy Public Link
                            </button>
                        </div>

                        <div class="sidebar-section">
                            <h3>Tool Status</h3>
                            <div class="action-group">
                                ${site.source_type === 'git'
                                    ? `<button class="btn btn-primary" style="width: 100%;" id="sync-btn" onclick="redeploy()">
                                         🔄 Sync Latest
                                       </button>
                                       <p class="text-xs text-muted">Pull the latest changes from ${escapeHtml(site.branch)} branch.</p>`
                                    : `<button class="btn btn-primary" style="width: 100%;" id="upload-btn" onclick="document.getElementById('upload-input').click()">
                                         📤 Update Version
                                       </button>
                                       <input type="file" id="upload-input" accept=".zip" hidden>
                                       <p class="text-xs text-muted">Upload a new .zip to replace current version.</p>`
                                }
                            </div>
                        </div>

                        ${site.source_type === 'git' && site.last_commit_sha ? `
                        <div class="sidebar-section">
                            <h3>Commit Status</h3>
                            <div class="info-grid">
                                <div class="info-item">
                                    <label>Deployed Commit</label>
                                    <span class="value" title="${escapeHtml(site.last_commit_sha)}">${escapeHtml(site.last_commit_sha.substring(0, 7))}</span>
                                    ${site.last_commit_message ? `<span class="text-xs text-muted" style="margin-top: 0.25rem;">${escapeHtml(site.last_commit_message)}</span>` : ''}
                                </div>
                                <div class="info-item" id="latest-commit-info">
                                    <label>Latest on ${escapeHtml(site.branch || 'main')}</label>
                                    <span class="value text-muted">Loading...</span>
                                </div>
                            </div>
                        </div>
                        ` : ''}

                        ${site.source_type === 'git' && site.repo_url ? `
                        <div class="sidebar-section">
                            <h3>Git Settings</h3>
                            <div class="info-grid">
                                <div class="info-item">
                                    <label for="branch-input">Branch</label>
                                    <div class="flex gap-2" style="align-items: center;">
                                        <select id="branch-input" style="flex: 1; font-size: 0.875rem; padding: 0.375rem 0.5rem;">
                                            <option value="${escapeHtml(site.branch || 'main')}" selected>${escapeHtml(site.branch || 'main')}</option>
                                        </select>
                                        <button class="btn btn-sm btn-secondary" id="save-branch-btn" onclick="saveBranch()" style="white-space: nowrap;">Save</button>
                                    </div>
                                </div>
                                <div class="info-item">
                                    <label for="subdir-input">Subdirectory</label>
                                    <div class="flex gap-2" style="align-items: center;">
                                        <input type="text" id="subdir-input" value="${escapeHtml(site.subdirectory)}" placeholder="(root)" style="flex: 1; font-size: 0.875rem; padding: 0.375rem 0.5rem;">
                                        <button class="btn btn-sm btn-secondary" id="save-subdir-btn" onclick="saveSubdir()" style="white-space: nowrap;">Save</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                        ` : ''}

                        <div class="sidebar-section">
                            <h3>Deployment Info</h3>
                            <div class="info-grid">
                                <div class="info-item">
                                    <label>Author</label>
                                    <span class="value">${escapeHtml(site.created_by)}</span>
                                </div>
                                <div class="info-item">
                                    <label>Created</label>
                                    <span class="value">${new Date(site.created_at).toLocaleDateString()}</span>
                                </div>
                                <div class="info-item">
                                    <label>Last Updated</label>
                                    <span class="value">${timeAgo(site.last_deployed_at)}</span>
                                </div>
                                ${site.repo_url ? `
                                <div class="info-item">
                                    <label>Repository</label>
                                    <a href="${site.repo_url}" target="_blank" class="value text-primary">${escapeHtml(site.repo_url.replace('https://github.com/', ''))}</a>
                                </div>
                                ` : ''}
                                <div class="info-item">
                                    <label>Visibility</label>
                                    <label class="toggle" style="margin-top: 0.25rem;">
                                        <input type="checkbox" id="public-toggle" ${site.public ? 'checked' : ''} onchange="togglePublic(this.checked)">
                                        <span class="toggle-slider"></span>
                                        <span class="toggle-label" id="public-label">${site.public ? 'Public' : 'Private'}</span>
                                    </label>
                                    <span class="text-xs text-muted" style="margin-top: 0.25rem;">${site.public ? 'Anyone with the link can access.' : 'Only authenticated users can access.'}</span>
                                </div>
                            </div>
                        </div>

                        <div class="sidebar-section mt-auto" style="padding-top: 2rem;">
                            <h3>Danger Zone</h3>
                            <div class="card" style="border-color: var(--danger-bg); background: var(--bg-body); padding: 1rem;">
                                <p class="text-xs text-muted mb-4">Deleting this tool will remove all its files and the URL will stop working.</p>
                                <button class="btn btn-danger btn-sm" style="width: 100%;" onclick="deleteSite()">Delete Tool</button>
                            </div>
                        </div>
                    </aside>
                `;

                // Re-bind upload handler
                const uploadInput = document.getElementById('upload-input');
                if (uploadInput) {
                    uploadInput.addEventListener('change', async () => {
                        if (!uploadInput.files.length) return;
                        const formData = new FormData();
                        formData.append('file', uploadInput.files[0]);
                        
                        const btn = document.getElementById('upload-btn');
                        btn.disabled = true;
                        btn.textContent = 'Uploading...';

                        try {
                            await fetch(`/api/sites/${slug}/upload`, {
                                method: 'POST',
                                body: formData,
                            });
                            toast('Tool updated successfully');
                            setTimeout(() => window.location.reload(), 800);
                        } catch (e) {
                            toast(e.message, 'error');
                            btn.disabled = false;
                            btn.textContent = 'Update Version';
                        }
                    });
                }

                // Load branch options and latest commit for git sites
                if (site.source_type === 'git' && site.repo_url) {
                    loadBranchOptions(site.repo_url, site.branch || 'main');
                    loadLatestCommit(site.repo_url, site.branch || 'main', site.last_commit_sha);
                }

            } catch (e) {
                container.innerHTML = `
                    <div class="empty-state" style="margin: 4rem auto; max-width: 600px;">
                        <h3>Tool Not Found</h3>
                        <p>The tool you're looking for might have been deleted or moved.</p>
                        <a href="/" class="btn btn-primary" style="margin-top: 1rem;">Back to Dashboard</a>
                    </div>
                `;
            }
        }

        function parseRepoFromUrl(repoUrl) {
            const match = repoUrl.match(/github\.com\/([^/]+)\/([^/.]+)/);
            return match ? { owner: match[1], repo: match[2] } : null;
        }

        async function loadLatestCommit(repoUrl, branch, deployedSha) {
            const parsed = parseRepoFromUrl(repoUrl);
            if (!parsed) return;
            const el = document.getElementById('latest-commit-info');
            if (!el) return;
            try {
                const commit = await apiJson(`/api/github/repos/${parsed.owner}/${parsed.repo}/commits/${encodeURIComponent(branch)}`);
                const shortSha = commit.sha.substring(0, 7);
                const isUpToDate = deployedSha && commit.sha.startsWith(deployedSha.substring(0, 7));
                el.innerHTML = `
                    <label>Latest on ${escapeHtml(branch)}</label>
                    <span class="value" title="${escapeHtml(commit.sha)}">${escapeHtml(shortSha)}</span>
                    <span class="text-xs text-muted" style="margin-top: 0.25rem;">${escapeHtml(commit.message)}</span>
                    ${isUpToDate
                        ? '<span class="text-xs" style="color: var(--success); margin-top: 0.5rem; font-weight: 600;">Up to date</span>'
                        : '<span class="text-xs" style="color: var(--warning, #e67e22); margin-top: 0.5rem; font-weight: 600;">Out of date — sync to update</span>'
                    }
                `;
            } catch (e) {
                el.innerHTML = `
                    <label>Latest on ${escapeHtml(branch)}</label>
                    <span class="value text-muted">Could not fetch</span>
                `;
            }
        }

        async function loadBranchOptions(repoUrl, currentBranch) {
            const parsed = parseRepoFromUrl(repoUrl);
            if (!parsed) return;
            try {
                const branches = await apiJson(`/api/github/repos/${parsed.owner}/${parsed.repo}/branches`);
                const select = document.getElementById('branch-input');
                if (select && branches.length) {
                    select.innerHTML = '';
                    branches.forEach(b => {
                        const opt = document.createElement('option');
                        opt.value = b.name;
                        opt.textContent = b.name;
                        if (b.name === currentBranch) opt.selected = true;
                        select.appendChild(opt);
                    });
                }
            } catch (e) { /* ignore - GitHub API may not be configured */ }
        }

        async function saveBranch() {
            const input = document.getElementById('branch-input');
            const newBranch = input.value.trim();
            if (!newBranch) return;

            const btn = document.getElementById('save-branch-btn');
            btn.disabled = true;
            btn.textContent = 'Saving...';

            try {
                await apiJson(`/api/sites/${slug}`, {
                    method: 'PUT',
                    body: JSON.stringify({ branch: newBranch }),
                });
                toast('Branch updated');
                if (confirm('Redeploy from the new branch now?')) {
                    await redeploy();
                } else {
                    setTimeout(() => window.location.reload(), 500);
                }
            } catch (e) {
                toast(e.message, 'error');
                btn.disabled = false;
                btn.textContent = 'Save';
            }
        }

        async function saveSubdir() {
            const input = document.getElementById('subdir-input');
            const newSubdir = input.value.trim();

            const btn = document.getElementById('save-subdir-btn');
            btn.disabled = true;
            btn.textContent = 'Saving...';

            try {
                await apiJson(`/api/sites/${slug}`, {
                    method: 'PUT',
                    body: JSON.stringify({ subdirectory: newSubdir }),
                });
                toast('Subdirectory updated');
                if (confirm('Redeploy with the new subdirectory now?')) {
                    await redeploy();
                } else {
                    setTimeout(() => window.location.reload(), 500);
                }
            } catch (e) {
                toast(e.message, 'error');
                btn.disabled = false;
                btn.textContent = 'Save';
            }
        }

        async function togglePublic(isPublic) {
            try {
                await apiJson(`/api/sites/${slug}`, {
                    method: 'PUT',
                    body: JSON.stringify({ public: isPublic }),
                });
                document.getElementById('public-label').textContent = isPublic ? 'Public' : 'Private';
                toast(isPublic ? 'Site is now public' : 'Site is now private');
                setTimeout(() => window.location.reload(), 800);
            } catch (e) {
                toast(e.message, 'error');
                document.getElementById('public-toggle').checked = !isPublic;
            }
        }

        async function redeploy() {
            const btn = document.getElementById('sync-btn');
            try {
                btn.disabled = true;
                btn.textContent = 'Syncing...';
                
                await apiJson(`/api/sites/${slug}/deploy`, { method: 'POST' });
                toast('Deployment successful');
                setTimeout(() => window.location.reload(), 800);
            } catch (e) {
                toast(e.message, 'error');
                btn.disabled = false;
                btn.textContent = '🔄 Sync Latest';
            }
        }

        async function deleteSite() {
            if (!confirm('Are you sure you want to permanently delete this tool?')) return;
            try {
                await api(`/api/sites/${slug}`, { method: 'DELETE' });
                window.location.href = '/';
            } catch (e) {
                toast(e.message, 'error');
            }
        }

        loadSite();
    </script>
</body>
</html>
