<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Tool Details - Site Manager</title>
    <link rel="stylesheet" href="/assets/style.css">
    <script src="/assets/app.js"></script>
    <style>
        .site-layout {
            display: grid;
            grid-template-columns: 1fr 320px;
            gap: 1.5rem;
            align-items: start;
        }

        @media (max-width: 768px) {
            .site-layout { grid-template-columns: 1fr; }
        }

        .preview-frame {
            width: 100%;
            height: 600px;
            border: none;
            background: white;
            border-radius: 0 0 var(--radius-md) var(--radius-md);
        }
        
        .preview-header {
            background: var(--bg-body);
            border-bottom: 1px solid var(--border);
            padding: 0.75rem 1rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-radius: var(--radius-md) var(--radius-md) 0 0;
        }

        .info-table {
            width: 100%;
            font-size: 0.875rem;
        }
        
        .info-table td {
            padding: 0.5rem 0;
            vertical-align: top;
        }
        
        .info-table .label {
            color: var(--text-muted);
            width: 100px;
        }
        
        .info-table .value {
            font-family: monospace;
            word-break: break-all;
        }
    </style>
</head>
<body>
    <nav>
        <div class="container">
            <a href="/" class="brand">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                    <polyline points="9 22 9 12 15 12 15 22"></polyline>
                </svg>
                Site Manager
            </a>
            <div class="user-info"></div>
        </div>
    </nav>

    <main class="container" style="padding-top: 2rem;">
        <div id="content" class="loading">
             <div class="spinner" style="margin: 3rem auto;"></div>
        </div>
    </main>

    <script>
        const slug = window.location.pathname.split('/').pop();

        async function loadSite() {
            const container = document.getElementById('content');
            try {
                const site = await apiJson(`/api/sites/${slug}`);
                document.title = `${site.name} - Site Manager`;
                const siteUrl = `/s/${site.slug}/`;
                const fullUrl = window.location.origin + siteUrl;

                container.innerHTML = `
                    <div class="flex items-center justify-between mb-6">
                        <div>
                            <div class="flex items-center gap-2 mb-1">
                                <h2 style="font-size: 1.75rem;">${escapeHtml(site.name)}</h2>
                                <span class="badge ${site.source_type}">${site.source_type}</span>
                            </div>
                            <a href="${siteUrl}" target="_blank" class="text-muted hover:text-primary flex items-center gap-1 font-mono text-sm">
                                ${siteUrl} 
                                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path><polyline points="15 3 21 3 21 9"></polyline><line x1="10" y1="14" x2="21" y2="3"></line></svg>
                            </a>
                        </div>
                        <div class="flex gap-2">
                             <button class="btn btn-secondary" onclick="copyToClipboard('${fullUrl}')">
                                🔗 Copy Link
                            </button>
                            <a href="${siteUrl}" target="_blank" class="btn btn-primary">
                                Open Tool ↗
                            </a>
                        </div>
                    </div>

                    <div class="site-layout">
                        <!-- Left: Preview -->
                        <div class="card" style="padding: 0; overflow: hidden; display: flex; flex-direction: column;">
                            <div class="preview-header">
                                <span class="text-sm text-muted font-mono">Preview</span>
                                <button class="btn btn-sm btn-secondary" onclick="document.getElementById('preview-frame').src += ''">↻ Refresh</button>
                            </div>
                            <iframe src="${siteUrl}" class="preview-frame" id="preview-frame"></iframe>
                        </div>

                        <!-- Right: Details & Settings -->
                        <div class="flex" style="flex-direction: column; gap: 1.5rem;">
                            
                            <!-- Actions Card -->
                            <div class="card">
                                <h3>Actions</h3>
                                <div class="flex flex-column gap-2" style="flex-direction: column;">
                                    ${site.source_type === 'git'
                                        ? `<button class="btn btn-secondary" style="justify-content: flex-start;" onclick="redeploy()">
                                             🔄 Sync & Redeploy
                                           </button>
                                           <p class="text-sm text-muted">Pull latest changes from GitHub.</p>`
                                        : `<button class="btn btn-secondary" style="justify-content: flex-start;" onclick="document.getElementById('upload-input').click()">
                                             📤 Upload New Version
                                           </button>
                                           <input type="file" id="upload-input" accept=".zip" hidden>
                                           <p class="text-sm text-muted">Replace current version with a new .zip.</p>`
                                    }
                                </div>
                            </div>

                            <!-- Info Card -->
                            <div class="card">
                                <h3>Details</h3>
                                <table class="info-table">
                                    <tr>
                                        <td class="label">Created</td>
                                        <td class="value">${new Date(site.created_at).toLocaleDateString()}</td>
                                    </tr>
                                    <tr>
                                        <td class="label">Last Deploy</td>
                                        <td class="value">${timeAgo(site.last_deployed_at)}</td>
                                    </tr>
                                    <tr>
                                        <td class="label">Author</td>
                                        <td class="value">${escapeHtml(site.created_by)}</td>
                                    </tr>
                                    ${site.repo_url ? `
                                    <tr>
                                        <td class="label">Repo</td>
                                        <td class="value"><a href="${site.repo_url}" target="_blank">${escapeHtml(site.repo_url.replace('https://github.com/', ''))}</a></td>
                                    </tr>
                                    <tr>
                                        <td class="label">Branch</td>
                                        <td class="value">${escapeHtml(site.branch)}</td>
                                    </tr>
                                    ` : ''}
                                </table>
                            </div>

                            <!-- Danger Zone -->
                            <div class="card" style="border-color: var(--danger-bg);">
                                <h3 class="text-danger" style="font-size: 1rem;">Danger Zone</h3>
                                <p class="text-sm text-muted mb-4">Once deleted, this tool cannot be recovered.</p>
                                <button class="btn btn-danger btn-sm" onclick="deleteSite()">Delete Tool</button>
                            </div>

                        </div>
                    </div>
                `;

                // Upload handler attachment
                const uploadInput = document.getElementById('upload-input');
                if (uploadInput) {
                    uploadInput.addEventListener('change', async () => {
                        if (!uploadInput.files.length) return;
                        const formData = new FormData();
                        formData.append('file', uploadInput.files[0]);
                        
                        // Show loading state
                        const btn = uploadInput.previousElementSibling; // The button
                        const originalText = btn.textContent;
                        btn.disabled = true;
                        btn.textContent = 'Uploading...';

                        try {
                            await fetch(`/api/sites/${slug}/upload`, {
                                method: 'POST',
                                body: formData,
                            });
                            toast('Upload complete');
                            setTimeout(() => window.location.reload(), 1000);
                        } catch (e) {
                            toast(e.message, 'error');
                            btn.disabled = false;
                            btn.textContent = originalText;
                        }
                    });
                }

            } catch (e) {
                container.innerHTML = `
                    <div class="empty-state">
                        <h3>Tool not found</h3>
                        <p><a href="/" class="btn btn-primary">Back to Dashboard</a></p>
                    </div>
                `;
            }
        }

        async function redeploy() {
            try {
                // Find button to show state
                const btns = document.querySelectorAll('button');
                btns.forEach(b => b.disabled = true);
                
                toast('Deploy started...');
                await apiJson(`/api/sites/${slug}/deploy`, { method: 'POST' });
                toast('Deploy complete');
                setTimeout(() => window.location.reload(), 1000);
            } catch (e) {
                toast(e.message, 'error');
                btns.forEach(b => b.disabled = false);
            }
        }

        async function deleteSite() {
            if (!confirm('Are you sure you want to delete this tool? This action cannot be undone.')) return;
            try {
                await api(`/api/sites/${slug}`, { method: 'DELETE' });
                window.location.href = '/';
            } catch (e) {
                toast(e.message, 'error');
            }
        }

        loadSite();
    </script>
</body>
</html>
