<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sign In - Site Manager</title>
    <link rel="stylesheet" href="/assets/style.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-color: var(--bg-body);
        }
        .login-wrapper {
            width: 100%;
            max-width: 440px;
            padding: 1.5rem;
        }
        .google-icon {
            width: 20px;
            height: 20px;
            margin-right: 10px;
        }
    </style>
</head>
<body>
    <div class="login-wrapper">
        <div class="card" style="text-align: center; padding: 4rem 2.5rem;">
            <div style="font-size: 3.5rem; margin-bottom: 1.5rem;">🔐</div>
            <h1 style="font-size: 1.75rem; margin-bottom: 0.75rem;">Site Manager</h1>
            <p class="text-muted" style="margin-bottom: 2.5rem;">Secure access for your company's internal tools.</p>
            
            <div id="error" style="display:none; background: var(--danger-bg); color: var(--danger); padding: 1rem; border-radius: var(--radius-sm); margin-bottom: 2rem; font-size: 0.875rem; text-align: left; border: 1px solid var(--danger);"></div>
            
            <a id="google-btn" href="/auth/google" class="btn btn-secondary" style="width: 100%; justify-content: center; padding: 0.875rem; font-size: 1rem;">
                <svg class="google-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/>
                    <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                    <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                    <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                </svg>
                Sign in with Google
            </a>
            
            <div style="margin-top: 2.5rem; padding-top: 1.5rem; border-top: 1px solid var(--border);">
                <div class="theme-selector" style="justify-content: center;">
                    <button class="theme-btn" data-theme="auto" onclick="setTheme('auto')">Auto</button>
                    <button class="theme-btn" data-theme="light" onclick="setTheme('light')">Light</button>
                    <button class="theme-btn" data-theme="dark" onclick="setTheme('dark')">Dark</button>
                </div>
            </div>
        </div>
    </div>
    <script src="/assets/app.js"></script>
    <script>
        const params = new URLSearchParams(window.location.search);
        const error = params.get('error');
        const redirect = params.get('redirect') || '/';

        if (error) {
            const el = document.getElementById('error');
            el.textContent = decodeURIComponent(error);
            el.style.display = 'block';
        }

        document.getElementById('google-btn').href =
            '/auth/google?redirect=' + encodeURIComponent(redirect);
    </script>
</body>
</html>
